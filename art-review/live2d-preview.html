<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小八 A · Live2D 本地预览</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #eef3f8;
      }

      .preview {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .preview > * {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      img {
        object-fit: fill;
      }

      canvas {
        z-index: 1;
      }
    </style>
    <script src="/js/live2dcubismcore.min.js"></script>
  </head>
  <body>
    <div class="preview">
      <img alt="桌面背景" src="/src-tauri/assets/models/blue-white-a-standard/resources/background.png" />
      <canvas id="live2d"></canvas>
    </div>
    <script type="module" src="/scripts/live2d-preview.ts"></script>
  </body>
</html>
